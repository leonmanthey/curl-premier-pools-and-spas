<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Report — Curl Premier Pools & Spas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.5;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #e8e8e6;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: #1a1a1a; display: flex; align-items: center;
      justify-content: center;
    }
    .topbar-logo svg { width: 18px; height: 18px; fill: #fff; }
    .topbar-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
    .topbar-right { font-size: 12px; color: #888; }

    .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    .page-header { margin-bottom: 1.75rem; }
    .page-header h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .page-header p { font-size: 13px; color: #666; margin-top: 4px; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .metric {
      background: #fff;
      border: 1px solid #e8e8e6;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .metric-value { font-size: 30px; font-weight: 500; line-height: 1; color: #1a1a1a; }
    .metric-value.blue { color: #185FA5; }
    .metric-value.green { color: #0B6E4F; }
    .metric-sub { font-size: 12px; color: #aaa; margin-top: 6px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border: 1px solid #e8e8e6;
      border-radius: 10px;
      padding: 1.25rem;
    }
    .card-title {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
    .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    .source-bars { display: flex; flex-direction: column; gap: 13px; }
    .source-row { display: flex; flex-direction: column; gap: 5px; }
    .source-meta { display: flex; justify-content: space-between; font-size: 12px; }
    .source-name { color: #1a1a1a; text-transform: capitalize; }
    .source-count { color: #aaa; }
    .bar-track { height: 7px; background: #f0efed; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; font-weight: 500; font-size: 11px; color: #aaa;
      padding: 7px 10px; border-bottom: 1px solid #f0efed;
      white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em;
    }
    td { padding: 10px 10px; border-bottom: 1px solid #f5f5f3; color: #1a1a1a; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }

    .badge {
      display: inline-block; font-size: 11px; padding: 2px 9px;
      border-radius: 20px; font-weight: 500; white-space: nowrap;
    }
    .badge-human { background: #deeaf8; color: #185FA5; }
    .badge-auto { background: #d4efe6; color: #0B6E4F; }
    .badge-self { background: #fde8c8; color: #8a5000; }
    .badge-other { background: #efefed; color: #555; }

    .cal-pill {
      font-size: 11px; color: #666; background: #f5f5f3;
      padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }

    .status-row { display: flex; align-items: center; gap: 5px; text-transform: capitalize; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .footer { font-size: 11px; color: #bbb; text-align: right; margin-top: 1.5rem; }

    .loading { text-align: center; padding: 5rem 2rem; color: #aaa; font-size: 14px; }
    .error {
      text-align: center; padding: 2rem; color: #a32d2d;
      background: #fdf0f0; border-radius: 10px; font-size: 13px; margin-top: 2rem;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><path d="M3 3h18v4H3zm0 6h12v4H3zm0 6h18v4H3z"/></svg>
    </div>
    <span class="topbar-title">Appointment Report</span>
  </div>
  <div class="topbar-right" id="topbar-meta"></div>
</div>

<div class="page">
  <div id="content">
    <div class="loading">Loading data...</div>
  </div>
</div>

<script>
const CAL_NAMES = {
  '6KiVbrUzAImXZ7bP1GyJ': 'Austin',
  '136oxD4jIEtZKCitj3zp': 'Houston',
  'ZSdptFjT3B4rUmWfFh7K': 'San Antonio'
};

const SOURCE_COLORS = {
  mobile_app: '#378ADD',
  opportunity_page: '#185FA5',
  contact_page: '#185FA5',
  booking_widget: '#E8920A',
  conversations_ai: '#1D9E75',
  third_party: '#5DCAA5',
  workflow: '#0B6E4F',
  api: '#9FE1CB',
  unknown: '#aaa'
};

const STATUS_COLORS = {
  confirmed: '#0B6E4F',
  cancelled: '#c0392b',
  new: '#378ADD',
  showed: '#0B6E4F',
  'no show': '#BA7517',
  noshow: '#BA7517'
};

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtRange(start, end) {
  const opts = { month: 'short', day: 'numeric' };
  const s = new Date(start).toLocaleDateString('en-US', opts);
  const e = new Date(end).toLocaleDateString('en-US', { ...opts, year: 'numeric' });
  return s + ' — ' + e;
}

function render(data) {
  const { meta, summary, sourceCounts, appointments } = data;
  const range = fmtRange(meta.startDate, meta.endDate);
  const generated = new Date(meta.generatedAt).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit'
  });

  document.getElementById('topbar-meta').textContent = 'Curl Premier Pools & Spas';

  const maxSrc = Math.max(...Object.values(sourceCounts), 1);
  const srcRows = Object.entries(sourceCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([src, cnt]) => {
      const pct = Math.round(cnt / maxSrc * 100);
      const appt = appointments.find(a => a.source === src);
      const label = appt?.sourceLabel || src.replace(/_/g, ' ');
      const color = SOURCE_COLORS[src] || '#aaa';
      return `<div class="source-row">
        <div class="source-meta">
          <span class="source-name">${label}</span>
          <span class="source-count">${cnt}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
    }).join('');

  const tableRows = appointments.slice(0, 30).map(a => {
    const badgeClass = a.type === 'human' ? 'badge-human'
      : a.type === 'auto' ? 'badge-auto'
      : a.type === 'self' ? 'badge-self' : 'badge-other';
    const badgeLabel = a.type === 'human' ? 'Human'
      : a.type === 'auto' ? 'Automation'
      : a.type === 'self' ? 'Self-booked' : 'Other';
    const cal = CAL_NAMES[a.calendarId] || '—';
    const statusColor = STATUS_COLORS[a.status?.toLowerCase()] || '#aaa';
    const title = a.title
      ? (a.title.length > 40 ? a.title.slice(0, 40) + '…' : a.title)
      : '—';
    return `<tr>
      <td>${title}</td>
      <td style="white-space:nowrap;">${fmtDate(a.startTime)}</td>
      <td><span class="cal-pill">${cal}</span></td>
      <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
      <td>
        <div class="status-row">
          <span class="status-dot" style="background:${statusColor}"></span>
          ${a.status || '—'}
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="page-header">
      <h1>Curl Premier Pools &amp; Spas</h1>
      <p>Design consultation appointments &nbsp;·&nbsp; ${range}</p>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Total booked</div>
        <div class="metric-value">${summary.total}</div>
        <div class="metric-sub">last 30 days</div>
      </div>
      <div class="metric">
        <div class="metric-label">Human booked</div>
        <div class="metric-value blue">${summary.human}</div>
        <div class="metric-sub">${summary.humanPct}% of total</div>
      </div>
      <div class="metric">
        <div class="metric-label">AI booked</div>
        <div class="metric-value green">${summary.auto}</div>
        <div class="metric-sub">${summary.autoPct}% of total</div>
      </div>
      <div class="metric">
        <div class="metric-label">Self-booked</div>
        <div class="metric-value">${summary.selfBooked}</div>
        <div class="metric-sub">via booking widget</div>
      </div>
    </div>

    <div class="row">
      <div class="card">
        <div class="card-title">Booking split</div>
        <div class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:#378ADD"></span>Human (${summary.human})</span>
          <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>AI / automation (${summary.auto})</span>
          <span class="legend-item"><span class="legend-dot" style="background:#E8920A"></span>Self-booked (${summary.selfBooked})</span>
          <span class="legend-item"><span class="legend-dot" style="background:#aaa"></span>Other (${summary.other})</span>
        </div>
        <div style="position:relative;height:200px;">
          <canvas id="donut" role="img" aria-label="Donut chart: booking split by type">
            Human ${summary.human}, AI ${summary.auto}, Self-booked ${summary.selfBooked}, Other ${summary.other}.
          </canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">By source</div>
        <div class="source-bars">${srcRows}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Recent appointments</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Appointment</th>
              <th>Date</th>
              <th>Location</th>
              <th>Type</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    <div class="footer">Last synced: ${generated}</div>
  `;

  new Chart(document.getElementById('donut'), {
    type: 'doughnut',
    data: {
      labels: ['Human', 'AI / automation', 'Self-booked', 'Other'],
      datasets: [{
        data: [summary.human, summary.auto, summary.selfBooked, summary.other],
        backgroundColor: ['#378ADD', '#1D9E75', '#E8920A', '#ccc'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      cutout: '68%'
    }
  });
}

fetch('data.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(render)
  .catch(err => {
    document.getElementById('content').innerHTML =
      `<div class="error">Could not load data: ${err.message}</div>`;
  });
</script>
</body>
</html>
