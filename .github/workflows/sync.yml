name: Sync GHL Appointments

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC (midnight CST)
  workflow_dispatch:      # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        run: python sync.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "sync: update appointment data $(date -u +%Y-%m-%d)"
          git push
